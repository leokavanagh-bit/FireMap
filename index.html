<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global News Interactive</title>
  <link rel="stylesheet" href="css/splash.css">
</head>
<body>

  <header class="splash-header">
    <img src="Images/Global News neg.svg" alt="Global News" class="splash-logo">
  </header>

  <main class="splash-main">
    <p class="splash-subtitle">Interactive Data</p>
    <div class="splash-cards">

      <a href="wildfire.html" class="splash-card">
        <div class="card-icon">🔥</div>
        <div class="card-name">Wildfire Tracker</div>
        <div class="card-desc">Real-time active fire locations across Canada</div>
      </a>

      <a href="gas.html" class="splash-card">
        <div class="card-icon">⛽</div>
        <div class="card-name">Gas Prices</div>
        <div class="card-desc">Current fuel prices across Canadian cities</div>
      </a>

      <a href="housing.html" class="splash-card">
        <div class="card-icon">🏠</div>
        <div class="card-name">Housing Prices</div>
        <div class="card-desc">Benchmark home prices and year-over-year trends</div>
      </a>

    </div>
  </main>

</body>
</html>
