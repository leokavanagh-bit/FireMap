<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canada Wildfire Tracker — Global News</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
</head>
<body>

<nav class="side-nav">
  <a href="index.html" class="nav-home">⌂ Home</a>
  <div class="nav-brand">
    <img src="Images/Global News neg.svg" class="nav-logo" alt="Global News">
    <div class="nav-divider"></div>
    <div class="nav-title">
      <span class="nav-title-main">Wildfire Tracker</span>
      <span class="nav-title-sub">Canada · Live</span>
    </div>
  </div>

  <div class="province-filters" id="province-filters">
    <button class="filter-pill active" data-province="all">All</button>
    <button class="filter-pill" data-province="BC">BC</button>
    <button class="filter-pill" data-province="AB">AB</button>
    <button class="filter-pill" data-province="SK">SK</button>
    <button class="filter-pill" data-province="MB">MB</button>
    <button class="filter-pill" data-province="ON">ON</button>
    <button class="filter-pill" data-province="QC">QC</button>
    <button class="filter-pill" data-province="NB">NB</button>
    <button class="filter-pill" data-province="NS">NS</button>
    <button class="filter-pill" data-province="NL">NL</button>
    <button class="filter-pill" data-province="YT">YT</button>
    <button class="filter-pill" data-province="NT">NT</button>
    <button class="filter-pill" data-province="NU">NU</button>
  </div>

  <div class="wind-toggle-wrap">
    <button class="wind-btn" id="wind-btn">💨 Wind</button>
  </div>

  <div class="nav-status">
    <span class="last-updated" id="last-updated">Loading…</span>
    <button class="refresh-btn" id="refresh-btn" title="Refresh data">↻</button>
  </div>
</nav>

<div id="map"></div>

<div class="stats-bar">
  <div class="stat">
    <span class="stat-value" id="stat-total">—</span>
    <span class="stat-label">Active Fires</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat">
    <span class="stat-value stat-value--red" id="stat-oc">—</span>
    <span class="stat-label">Out of Control</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat">
    <span class="stat-value" id="stat-provinces">—</span>
    <span class="stat-label">Provinces Affected</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat">
    <span class="stat-value" id="stat-ha">—</span>
    <span class="stat-label">Total Hectares</span>
  </div>
</div>

<!-- Fire detail panel -->
<div class="fire-panel" id="fire-panel">
  <button class="panel-close" id="panel-close">✕</button>
  <div class="panel-header">
    <div class="panel-fire-icon">🔥</div>
    <div>
      <div class="panel-title" id="panel-firename">—</div>
      <div class="panel-province" id="panel-province">—</div>
    </div>
  </div>
  <div class="panel-body">
    <div class="panel-row">
      <span class="panel-label">Size</span>
      <span class="panel-value" id="panel-hectares">—</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Stage of Control</span>
      <span class="panel-value" id="panel-soc">—</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Cause</span>
      <span class="panel-value" id="panel-cause">—</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Started</span>
      <span class="panel-value" id="panel-startdate">—</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Coordinates</span>
      <span class="panel-value" id="panel-coords">—</span>
    </div>
    <div class="panel-divider"></div>
    <div class="panel-row">
      <span class="panel-label">Wind Speed</span>
      <span class="panel-value" id="panel-wind-speed">—</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Wind From</span>
      <span class="panel-value" id="panel-wind-dir">—</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Smoke Heading</span>
      <span class="panel-value panel-smoke" id="panel-smoke-dir">—</span>
    </div>
  </div>
</div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading fire data…</div>
</div>

<!-- Error banner -->
<div class="error-banner" id="error-banner" style="display:none;">
  ⚠ Unable to load fire data — check connection.
</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<script src="js/app.js"></script>
</body>
</html>
